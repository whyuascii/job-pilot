# Local development services
#
# In production:
#   - PostgreSQL → Supabase managed (DATABASE_URL points to Supabase)
#   - Redis → ElastiCache (or Upstash)
#   - MinIO → Supabase Storage (S3-compatible, configure via S3_ENDPOINT env var)
#
# For local dev, this compose file provides all three services.
# Alternatively, use `npx supabase start` for Postgres + Storage,
# and keep only the redis service from this file.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: jobpilot
      POSTGRES_DB: jobpilot
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobpilot']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobpilot-redis
    restart: unless-stopped
    command: redis-server --requirepass jobpilot
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'jobpilot', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: jobpilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  rxresume:
    image: amruthpillai/reactive-resume:latest
    container_name: jobpilot-rxresume
    restart: unless-stopped
    environment:
      PORT: '3100'
      NODE_ENV: production
      PUBLIC_URL: http://localhost:3100
      STORAGE_URL: http://minio:9000/job-pilot
      DATABASE_URL: postgresql://jobpilot:jobpilot@postgres:5432/rxresume
      ACCESS_TOKEN_SECRET: rxresume-access-secret-change-me
      REFRESH_TOKEN_SECRET: rxresume-refresh-secret-change-me
      CHROME_TOKEN: chrome_token
      CHROME_URL: ws://rxresume-printer:3000
      STORAGE_ENDPOINT: minio
      STORAGE_PORT: '9000'
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: job-pilot
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_USE_SSL: 'false'
      FLAG_DISABLE_SIGNUPS: 'false'
    ports:
      - '127.0.0.1:3100:3100'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rxresume-printer:
        condition: service_started

  rxresume-printer:
    image: ghcr.io/browserless/chromium:latest
    container_name: jobpilot-rxresume-printer
    restart: unless-stopped
    environment:
      TOKEN: chrome_token
      TIMEOUT: '10000'
      CONCURRENT: '10'
      HEALTH: 'true'
    ports:
      - '127.0.0.1:3200:3000'

  minio-setup:
    image: minio/mc:latest
    container_name: jobpilot-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/job-pilot;
      mc anonymous set download local/job-pilot/public;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:

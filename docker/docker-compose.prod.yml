version: '3.9'

# Production overlay - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# For cloud deployment (ECS/Fargate), use managed services for Postgres/Redis/S3.

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
      POSTGRES_DB: ${POSTGRES_DB:-jobpilot}
    ports:
      - '127.0.0.1:5432:5432'
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '127.0.0.1:6379:6379'
    restart: always

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    restart: always

  # ─── API Service ─────────────────────────────────────────────────────────
  api:
    image: job-pilot-api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobpilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jobpilot}
      REDIS_URL: ${REDIS_URL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-job-pilot}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

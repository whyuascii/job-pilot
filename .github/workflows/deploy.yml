name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write # OIDC token for AWS auth
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ─── CI Gate ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo type-check
        continue-on-error: false

      - name: Build
        run: pnpm turbo build

      - name: Run tests
        run: pnpm vitest run

  # ─── Build & Push API Docker Image ─────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag from commit SHA
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.version }}
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t "$REGISTRY/whyuascii/job-pilot-api:$TAG" \
            .
          docker push "$REGISTRY/whyuascii/job-pilot-api:$TAG"

  # ─── Deploy Web to S3 + CloudFront ────────────────────────────────────────
  deploy-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
        run: pnpm turbo build --filter=@job-pilot/web

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync apps/web/dist/ s3://${{ vars.WEB_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─── Run Database Migrations ──────────────────────────────────────────────
  migrate:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations via ECS task
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ECR_URL: ${{ vars.API_ECR_REPO_URL }}
        run: |
          set -euo pipefail
          # Get the current task definition to reuse its config (env vars, vpc, etc.)
          TASK_DEF=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services job-pilot-api \
            --query 'services[0].taskDefinition' \
            --output text)

          # Register a new task definition with the latest image
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query 'taskDefinition' \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
            | jq --arg img "$ECR_URL:$IMAGE_TAG" '.containerDefinitions[0].image = $img' \
            > migrate-task-def.json

          MIGRATE_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://migrate-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Get the network config from the running service
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services job-pilot-api \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Run migration as a one-off task with command override
          # migrate.ts resolves the migrations folder via __dirname (no CWD dependency)
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --task-definition "$MIGRATE_TASK_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "job-pilot-api",
                "command": ["node", "--import", "tsx", "/app/packages/db/src/run-migrate.ts"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          # Wait for the task to complete
          aws ecs wait tasks-stopped \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            aws ecs describe-tasks \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].reason' \
              --output text
            exit 1
          fi

          echo "Migrations completed successfully"

  # ─── Deploy API to ECS ────────────────────────────────────────────────────
  deploy-api:
    needs: [build, migrate]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API service
        env:
          SERVICE: job-pilot-api
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ECR_URL: ${{ vars.API_ECR_REPO_URL }}
        run: |
          set -euo pipefail
          TASK_DEF=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query 'taskDefinition' \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)' \
            | jq --arg img "$ECR_URL:$IMAGE_TAG" '.containerDefinitions[0].image = $img' \
            > new-task-def.json

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "$SERVICE" \
            --task-definition "$NEW_TASK_ARN"

      - name: Wait for API deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services job-pilot-api
